services:
  db:
    image: postgres:15-alpine
    container_name: tesis_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./innotech_db.sql:/docker-entrypoint-initdb.d/innotech_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tesis_network

  api:
    build: ./api-ia
    container_name: tesis_api
    command: >
      sh -c "
      python manage.py makemigrations &&
      python manage.py migrate &&
      python manage.py createsuperuser --noinput || true &&
      python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./api-ia:/app
      - /app/__pycache__
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - tesis_network

  front:
    build:
      context: ./front-ia
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: tesis_front
    depends_on:
      - api
    restart: on-failure
    networks:
      - tesis_network

  nginx:
    image: nginx:alpine
    container_name: tesis_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - front
    restart: always
    networks:
      - tesis_network

networks:
  tesis_network:
    driver: bridge

volumes:
  postgres_data: